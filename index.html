<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 50px 16px;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 30px 24px;
      color: #fff;
    }

    .card-header h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-header p {
      font-size: 13px;
      opacity: 0.8;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    .stat-box {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 16px;
      text-align: center;
    }

    .stat-box strong { display: block; font-size: 20px; font-weight: 700; }
    .stat-box span   { font-size: 11px; opacity: 0.8; }

    .card-body { padding: 24px 30px; }

    /* Input */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    .input-row input:focus { border-color: #667eea; }
    .input-row input::placeholder { color: #bbb; }

    .btn-add {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .f-btn {
      background: #f3f4f6;
      border: none;
      color: #888;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .f-btn:hover { background: #e5e7eb; color: #555; }
    .f-btn.active { background: #667eea; color: #fff; }

    /* Tasks */
    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: #f9fafb;
      border-radius: 10px;
      margin-bottom: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fadeIn 0.25s ease;
    }

    .task-item:hover {
      transform: translateX(3px);
      box-shadow: 0 2px 12px rgba(102,126,234,0.15);
    }

    .task-item.done { opacity: 0.55; }

    /* Custom checkbox */
    .check-wrap {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid #d1d5db;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: #fff;
    }

    .check-wrap:hover { border-color: #667eea; }

    .check-wrap.checked {
      background: #667eea;
      border-color: #667eea;
    }

    .check-wrap.checked::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .task-text {
      flex: 1;
      font-size: 14px;
      color: #374151;
      transition: color 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .btn-del {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 15px;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 6px;
      transition: all 0.2s;
      line-height: 1;
    }

    .btn-del:hover { color: #ef4444; background: #fef2f2; }

    /* Empty */
    .empty { display: none; text-align: center; padding: 36px 0; color: #bbb; }
    .empty.show { display: block; }
    .empty .icon { font-size: 40px; margin-bottom: 10px; }
    .empty p { font-size: 14px; }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    .footer span { font-size: 12px; color: #9ca3af; }

    .btn-clear {
      background: none; border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 12px; color: #9ca3af;
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-clear:hover { color: #ef4444; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>📝 To-Do List</h1>
    <p>Stay organized, get things done.</p>
    <div class="stats-row">
      <div class="stat-box">
        <strong id="s-total">0</strong>
        <span>Total</span>
      </div>
      <div class="stat-box">
        <strong id="s-done">0</strong>
        <span>Done</span>
      </div>
      <div class="stat-box">
        <strong id="s-left">0</strong>
        <span>Left</span>
      </div>
    </div>
  </div>

  <div class="card-body">
    <div class="input-row">
      <input type="text" id="task-input" placeholder="What needs to be done?" maxlength="80"/>
      <button class="btn-add" onclick="addTask()">+ Add</button>
    </div>

    <div class="filters">
      <button class="f-btn active" onclick="setFilter('all',this)">All</button>
      <button class="f-btn" onclick="setFilter('active',this)">Active</button>
      <button class="f-btn" onclick="setFilter('done',this)">Completed</button>
    </div>

    <ul class="task-list" id="task-list"></ul>
    <div class="empty" id="empty">
      <div class="icon">🗂️</div>
      <p>No tasks here. Add one above!</p>
    </div>

    <div class="footer">
      <span id="count-label">0 tasks left</span>
      <button class="btn-clear" onclick="clearDone()">Clear completed</button>
    </div>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('todos_v2') || '[]');
  let filter = 'all';

  function save() { localStorage.setItem('todos_v2', JSON.stringify(tasks)); }

  function addTask() {
    const inp = document.getElementById('task-input');
    const text = inp.value.trim();
    if (!text) { inp.focus(); return; }
    tasks.unshift({ id: Date.now(), text, done: false });
    inp.value = ''; save(); render(); inp.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    const left  = total - done;

    document.getElementById('s-total').textContent = total;
    document.getElementById('s-done').textContent  = done;
    document.getElementById('s-left').textContent  = left;
    document.getElementById('count-label').textContent = left + ' task' + (left !== 1 ? 's' : '') + ' left';

    const filtered = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return t.done;
      return true;
    });

    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty');

    if (filtered.length === 0) {
      list.innerHTML = ''; empty.classList.add('show');
    } else {
      empty.classList.remove('show');
      list.innerHTML = filtered.map(t => `
        <li class="task-item ${t.done ? 'done' : ''}">
          <div class="check-wrap ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
          <span class="task-text">${esc(t.text)}</span>
          <button class="btn-del" onclick="deleteTask(${t.id})">✕</button>
        </li>
      `).join('');
    }
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
